# Production deploy to Vercel on push to `main` / `master` (requires repo secrets).
#
# GitHub → Repo → Settings → Secrets and variables → Actions → New repository secret:
#   VERCEL_TOKEN        — https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — from `.vercel/project.json` after `vercel link`, or Vercel dashboard
#   VERCEL_PROJECT_ID   — same as above
#
# Optional: Settings → Variables → Actions → NEXT_PUBLIC_SITE_URL = https://your-domain.com
name: Deploy (Vercel)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
