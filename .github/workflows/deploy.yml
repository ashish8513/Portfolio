# Lint + production build on push / PR. EC2 deploy runs after CI succeeds on `main` only (single run).
#
# Deploy secrets: HOST, USERNAME, SSH_KEY. Server needs repo at /var/www/Portfolio, Node, PM2 app "portfolio".
name: CI & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Main: let deploys finish; other refs: cancel superseded CI.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

  deploy:
    name: Deploy to EC2
    needs: lint-and-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 25m
          envs: NEXT_PUBLIC_SITE_URL
          script: |
            set -euo pipefail
            APP_DIR="/var/www/Portfolio"
            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR" || true
            git pull origin main
            npm install
            npm run build
            pm2 restart portfolio
